<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Mandina Kitchen Inventory & Production V2</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--red:#E9553F;--dark:#3b241c;--cream:#fff7ef;--line:#ecd7cc;--muted:#7b6259;--ok:#16824a;--warn:#c06a00}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--cream);color:var(--dark)}header{background:linear-gradient(135deg,var(--red),#f07a38);color:white;padding:14px 18px;display:flex;gap:12px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}.brand{font-weight:800;font-size:20px}.small{font-size:12px;color:var(--muted)}button,.btn{border:0;border-radius:10px;background:var(--red);color:#fff;padding:9px 12px;font-weight:700;cursor:pointer}button.secondary{background:#fff;color:var(--dark);border:1px solid var(--line)}button.danger{background:#9b1c1c}button:disabled{opacity:.5}.wrap{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 60px)}nav{padding:14px;background:#fff7;border-right:1px solid var(--line)}nav button{display:block;width:100%;margin:6px 0;text-align:left;background:white;color:var(--dark);border:1px solid var(--line)}nav button.active{background:var(--red);color:white}main{padding:18px}.card{background:white;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 4px 14px #0000000d}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:10px;background:white}label{font-weight:700;font-size:13px;display:block;margin:7px 0 4px}table{width:100%;border-collapse:collapse;background:white}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;font-size:14px}th{color:var(--muted)}.hide{display:none!important}.pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#fff1eb;color:var(--red);font-size:12px;font-weight:800}.ok{color:var(--ok)}.warn{color:var(--warn)}@media(max-width:800px){.wrap{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:6px}nav button{min-width:130px}.brand{font-size:16px}}
</style>
</head>
<body>
<header><div><div class="brand">Mandina Kitchen Inventory & Production V2</div><div id="who" class="small" style="color:white"></div></div><div class="row"><select id="branchSelect" style="width:190px"></select><button id="loginBtn">Google Login</button><button id="logoutBtn" class="secondary hide">Logout</button></div></header>
<div class="wrap"><nav id="nav"></nav><main id="app"><div class="card">Loading...</div></main></div>
<script>
/* 1) Create new Supabase project. 2) Run mandina_v2_setup.sql. 3) Put your project URL/key below. 4) In Supabase Auth URL config add your Vercel/GitHub Pages URL. First Google login with thegameboyxxx@gmail.com becomes Manager automatically. */
const SUPABASE_URL = 'PASTE_YOUR_SUPABASE_URL_HERE';
const SUPABASE_ANON_KEY = 'PASTE_YOUR_SUPABASE_ANON_KEY_HERE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const state={user:null,profile:null,branches:[],branchId:null,items:[],suppliers:[],units:[],cats:[],menu:[],view:'dashboard'};
const modules=[
 ['dashboard','Dashboard'],['suppliers','Suppliers'],['items','Items'],['po','Purchase Orders'],['receiving','Receiving'],['stock','Stock'],['counts','Daily Count'],['production','Production'],['menu','Menu & Recipes'],['sales','Sales'],['waste','Waste'],['staff','Staff Meals/Clock'],['alerts','Alerts']
];
const $=id=>document.getElementById(id); const money=n=>Number(n||0).toFixed(2); const num=n=>Number(n||0);
function isMgr(){return state.profile?.role==='manager'}
async function q(table, cols='*'){let r=await sb.from(table).select(cols); if(r.error) throw r.error; return r.data||[]}
async function init(){
 $('loginBtn').onclick=()=>sb.auth.signInWithOAuth({provider:'google'}); $('logoutBtn').onclick=()=>sb.auth.signOut();
 sb.auth.onAuthStateChange(()=>load()); await load();
}
async function load(){
 const {data:{user}}=await sb.auth.getUser(); state.user=user; if(!user){renderLogin();return}
 $('loginBtn').classList.add('hide'); $('logoutBtn').classList.remove('hide');
 let pr=await sb.from('profiles').select('*').eq('id',user.id).single(); state.profile=pr.data;
 state.branches=await q('branches'); const allowed= isMgr()?state.branches:(await sb.from('user_branch_access').select('branch_id').eq('user_id',user.id)).data?.map(x=>x.branch_id)||[];
 if(!isMgr()) state.branches=state.branches.filter(b=>allowed.includes(b.id)); state.branchId=state.branchId||state.branches[0]?.id;
 $('who').textContent=`${state.profile?.full_name||user.email} • ${state.profile?.role||'staff'}`;
 $('branchSelect').innerHTML=state.branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join(''); $('branchSelect').value=state.branchId||''; $('branchSelect').disabled=!isMgr()&&state.branches.length<=1; $('branchSelect').onchange=e=>{state.branchId=e.target.value; render()};
 await loadSetup(); renderNav(); render();
}
async function loadSetup(){ state.units=await q('units'); state.cats=await q('item_categories'); state.suppliers=await q('suppliers'); state.items=await q('items','*, item_categories(name), units!items_stock_unit_id_fkey(name)'); state.menu=await q('menu_items'); }
function renderLogin(){ $('nav').innerHTML=''; $('app').innerHTML=`<div class="card"><h2>Login</h2><p>Use Google Auth through your new Supabase project.</p><button onclick="sb.auth.signInWithOAuth({provider:'google'})">Login with Google</button><p class="small">First Google login with thegameboyxxx@gmail.com becomes Manager automatically.</p></div>`; }
function renderNav(){ $('nav').innerHTML=modules.map(m=>`<button class="${state.view===m[0]?'active':''}" onclick="state.view='${m[0]}';renderNav();render()">${m[1]}</button>`).join(''); }
function branchName(){return state.branches.find(b=>b.id===state.branchId)?.name||''}
function opt(rows,label='name'){return rows.map(x=>`<option value="${x.id}">${x[label]}</option>`).join('')}
function render(){ if(!state.user)return; const v=state.view; ({dashboard,suppliers,items,po,receiving,stock,counts,production,menu,sales,waste,staff,alerts}[v]||dashboard)(); }
async function dashboard(){ let [alerts,stock]=await Promise.all([sb.from('alerts').select('*').eq('branch_id',state.branchId).eq('resolved',false).order('created_at',{ascending:false}).limit(8), sb.from('stock_balances').select('*, items(name)').eq('branch_id',state.branchId).limit(8)]); $('app').innerHTML=`<h2>${branchName()} Dashboard</h2><div class="grid"><div class="card"><h3>Active Alerts</h3><h1>${alerts.data?.length||0}</h1></div><div class="card"><h3>Tracked Stock Rows</h3><h1>${stock.data?.length||0}</h1></div><div class="card"><h3>Role</h3><h1>${state.profile.role}</h1></div></div><div class="card"><h3>Latest Alerts</h3>${table(alerts.data||[],['alert_type','title','body','created_at'])}</div><div class="card"><h3>Current Stock Sample</h3>${table((stock.data||[]).map(x=>({item:x.items?.name, qty:x.qty_on_hand})),['item','qty'])}</div>`; }
function table(rows,cols){ if(!rows.length)return '<p class="small">No records yet.</p>'; return `<table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function guardManager(){ if(!isMgr()){ $('app').innerHTML='<div class="card"><h3>Manager only</h3><p>You do not have permission for this setup page.</p></div>'; return false } return true }
async function suppliers(){ const rows=await q('suppliers'); $('app').innerHTML=`<h2>Suppliers</h2>${isMgr()?`<div class="card grid"><div><label>Company</label><input id="s_name"></div><div><label>Email</label><input id="s_email"></div><div><label>Phone</label><input id="s_phone"></div><div><label>Contact</label><input id="s_contact"></div><div><label>&nbsp;</label><button onclick="addSupplier()">Add Supplier</button></div></div>`:''}<div class="card">${table(rows.map(r=>isMgr()?r:{company_name:r.company_name,company_phone:r.company_phone,active:r.active}), isMgr()?['company_name','contact_person','company_phone','contact_mobile','company_email','active']:['company_name','company_phone','active'])}</div>`}
async function addSupplier(){ await sb.from('suppliers').insert({company_name:$('s_name').value,company_email:$('s_email').value,company_phone:$('s_phone').value,contact_person:$('s_contact').value,created_by:state.user.id}); await loadSetup(); suppliers(); }
async function items(){ const rows=await q('items','*, item_categories(name), suppliers(company_name), units!items_stock_unit_id_fkey(name)'); $('app').innerHTML=`<h2>Items</h2>${isMgr()?`<div class="card grid"><div><label>Name</label><input id="i_name"></div><div><label>Category</label><select id="i_cat">${opt(state.cats)}</select></div><div><label>Supplier</label><select id="i_sup"><option></option>${opt(state.suppliers,'company_name')}</select></div><div><label>Stock Unit</label><select id="i_unit">${opt(state.units)}</select></div><div><label>Reorder Level</label><input id="i_rl" type="number" step="0.001"></div><div><label>Sales Recipe Controlled</label><select id="i_src"><option value="false">No</option><option value="true">Yes</option></select></div><div><label>&nbsp;</label><button onclick="addItem()">Add Item</button></div></div>`:''}<div class="card">${table(rows.map(r=>({name:r.name,category:r.item_categories?.name,supplier:r.suppliers?.company_name,unit:r.units?.name,reorder_level:r.reorder_level,sales_recipe_controlled:r.sales_recipe_controlled, price:isMgr()?r.default_purchase_price:'hidden'})),['name','category','supplier','unit','reorder_level','sales_recipe_controlled','price'])}</div>`}
async function addItem(){ await sb.from('items').insert({name:$('i_name').value,category_id:$('i_cat').value||null,primary_supplier_id:$('i_sup').value||null,stock_unit_id:$('i_unit').value||null,reorder_level:num($('i_rl').value),sales_recipe_controlled:$('i_src').value==='true',created_by:state.user.id}); await loadSetup(); items(); }
async function po(){ let rows=(await sb.from('purchase_orders').select('*, suppliers(company_name)').eq('branch_id',state.branchId).order('created_at',{ascending:false})).data||[]; $('app').innerHTML=`<h2>Purchase Orders</h2><div class="card grid"><div><label>Supplier</label><select id="po_sup">${opt(state.suppliers,'company_name')}</select></div><div><label>Expected Delivery</label><input id="po_date" type="date"></div><div><label>Notes</label><input id="po_notes"></div><div><label>&nbsp;</label><button onclick="addPO()">Create Draft PO</button></div></div><div class="card"><h3>POs</h3>${table(rows.map(r=>({po_number:r.po_number,supplier:r.suppliers?.company_name,status:r.status,expected_delivery:r.expected_delivery,notes:r.notes,created_at:r.created_at})),['po_number','supplier','status','expected_delivery','notes','created_at'])}</div><div class="card"><h3>Add PO Line</h3><div class="grid"><select id="po_id">${rows.map(r=>`<option value="${r.id}">${r.po_number}</option>`)}</select><select id="po_item">${opt(state.items)}</select><input id="po_qty" type="number" step="0.001" placeholder="Qty"><input id="po_price" type="number" step="0.01" placeholder="Unit price"><button onclick="addPOLine()">Add Line</button></div></div>`}
async function addPO(){ await sb.from('purchase_orders').insert({branch_id:state.branchId,supplier_id:$('po_sup').value,status:'draft',expected_delivery:$('po_date').value||null,notes:$('po_notes').value,created_by:state.user.id}); po(); }
async function addPOLine(){ await sb.from('purchase_order_lines').insert({purchase_order_id:$('po_id').value,item_id:$('po_item').value,ordered_qty:num($('po_qty').value),unit_price:num($('po_price').value)}); alert('PO line added'); }
async function receiving(){ let pos=(await sb.from('purchase_orders').select('*').eq('branch_id',state.branchId).order('created_at',{ascending:false})).data||[]; $('app').innerHTML=`<h2>Receiving / GRN</h2><div class="card"><p>Receiving creates stock movements. If received is greater than ordered, an over-delivery alert is created.</p><div class="grid"><div><label>PO</label><select id="r_po">${pos.map(p=>`<option value="${p.id}" data-sup="${p.supplier_id||''}">${p.po_number}</option>`)}</select></div><div><label>Item</label><select id="r_item">${opt(state.items)}</select></div><div><label>Ordered Qty</label><input id="r_ordered" type="number" step="0.001"></div><div><label>Received Qty</label><input id="r_received" type="number" step="0.001"></div><div><label>Accepted Qty</label><input id="r_accepted" type="number" step="0.001"></div><div><label>Rejected Qty</label><input id="r_rejected" type="number" step="0.001" value="0"></div><div><label>Reject Reason</label><input id="r_reason"></div><div><label>Actual Unit Price</label><input id="r_price" type="number" step="0.01"></div><div><label>&nbsp;</label><button onclick="saveReceiving()">Save GRN Line</button></div></div></div>`}
async function saveReceiving(){ const poid=$('r_po').value; const po=(await sb.from('purchase_orders').select('*').eq('id',poid).single()).data; let rn=(await sb.from('receiving_notes').insert({branch_id:state.branchId,purchase_order_id:poid,supplier_id:po.supplier_id,created_by:state.user.id}).select().single()).data; await sb.from('receiving_note_lines').insert({receiving_note_id:rn.id,item_id:$('r_item').value,ordered_qty:num($('r_ordered').value),received_qty:num($('r_received').value),accepted_qty:num($('r_accepted').value),rejected_qty:num($('r_rejected').value),actual_unit_price:num($('r_price').value),rejection_reason:$('r_reason').value}); alert('Receiving saved and stock updated'); }
async function stock(){ let rows=(await sb.from('stock_balances').select('*, items(name)').eq('branch_id',state.branchId)).data||[]; $('app').innerHTML=`<h2>Stock Ledger / Current Stock</h2><div class="card">${table(rows.map(r=>({item:r.items?.name,qty_on_hand:r.qty_on_hand})),['item','qty_on_hand'])}</div>${isMgr()?`<div class="card"><h3>Manager Adjustment</h3><div class="grid"><select id="adj_item">${opt(state.items)}</select><input id="adj_qty" type="number" step="0.001" placeholder="+/- Qty"><input id="adj_reason" placeholder="Reason"><button onclick="adjustStock()">Save Adjustment</button></div></div>`:''}` }
async function adjustStock(){ await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:$('adj_item').value,source_type:'MANAGER_ADJUSTMENT',qty:num($('adj_qty').value),reason:$('adj_reason').value,created_by:state.user.id}); stock(); }
async function counts(){ $('app').innerHTML=`<h2>Daily Count</h2><div class="card grid"><div><label>Item</label><select id="c_item">${opt(state.items)}</select></div><div><label>Expected Qty</label><input id="c_exp" type="number" step="0.001"></div><div><label>Counted Qty</label><input id="c_count" type="number" step="0.001"></div><div><label>Notes</label><input id="c_notes"></div><div><label>&nbsp;</label><button onclick="saveCount()">Save Count</button></div></div>` }
async function saveCount(){ let sc=(await sb.from('stock_counts').insert({branch_id:state.branchId,created_by:state.user.id}).select().single()).data; let diff=num($('c_count').value)-num($('c_exp').value); await sb.from('stock_count_lines').insert({stock_count_id:sc.id,item_id:$('c_item').value,expected_qty:num($('c_exp').value),counted_qty:num($('c_count').value),difference_qty:diff,notes:$('c_notes').value}); await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:$('c_item').value,source_type:'DAILY_COUNT_ADJUSTMENT',qty:diff,reason:'Daily count adjustment',created_by:state.user.id}); alert('Count saved'); }
async function production(){ let rec=await q('production_recipes'); $('app').innerHTML=`<h2>Production</h2>${isMgr()?`<div class="card"><h3>Recipe Setup</h3><div class="grid"><input id="pr_name" placeholder="Recipe name"><select id="pr_out">${opt(state.items)}</select><input id="pr_base" type="number" step="0.001" placeholder="Base qty"><input id="pr_outqty" type="number" step="0.001" placeholder="Output qty"><button onclick="addRecipe()">Add Recipe</button></div><p class="small">Add inputs directly in Supabase for now, or extend this module later.</p></div>`:''}<div class="card"><h3>Run Batch</h3><div class="grid"><select id="pb_recipe">${rec.map(r=>`<option value="${r.id}">${r.name}</option>`)}</select><input id="pb_base" type="number" step="0.001" placeholder="Actual base qty"><button onclick="runBatch()">Save Batch</button></div></div>`}
async function addRecipe(){ await sb.from('production_recipes').insert({name:$('pr_name').value,output_item_id:$('pr_out').value,base_qty:num($('pr_base').value),output_qty:num($('pr_outqty').value)}); production(); }
async function runBatch(){ let r=(await sb.from('production_recipes').select('*').eq('id',$('pb_recipe').value).single()).data; let factor=num($('pb_base').value)/num(r.base_qty); let out=num(r.output_qty)*factor; let b=(await sb.from('production_batches').insert({branch_id:state.branchId,recipe_id:r.id,actual_base_qty:num($('pb_base').value),calculated_output_qty:out,created_by:state.user.id}).select().single()).data; let inputs=(await sb.from('production_recipe_inputs').select('*').eq('recipe_id',r.id)).data||[]; for(const i of inputs) await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:i.item_id,source_type:'PRODUCTION_INPUT',qty:-num(i.qty)*factor,source_table:'production_batches',source_id:b.id,created_by:state.user.id}); await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:r.output_item_id,source_type:'PRODUCTION_OUTPUT',qty:out,source_table:'production_batches',source_id:b.id,created_by:state.user.id}); alert('Batch saved'); }
async function menu(){ if(!guardManager())return; let rows=await q('menu_items'); $('app').innerHTML=`<h2>Menu & Recipes</h2><div class="card grid"><input id="m_name" placeholder="Menu item"><input id="m_price" type="number" step="0.01" placeholder="Sale price"><button onclick="addMenu()">Add Menu Item</button></div><div class="card"><h3>Add Component</h3><div class="grid"><select id="mc_menu">${opt(rows)}</select><select id="mc_item">${opt(state.items)}</select><input id="mc_qty" type="number" step="0.001" placeholder="Qty per sale"><button onclick="addComponent()">Add Component</button></div></div><div class="card">${table(rows,['name','sale_price','active'])}</div>`}
async function addMenu(){ await sb.from('menu_items').insert({name:$('m_name').value,sale_price:num($('m_price').value)}); await loadSetup(); menu(); }
async function addComponent(){ await sb.from('menu_item_components').insert({menu_item_id:$('mc_menu').value,item_id:$('mc_item').value,qty_per_sale:num($('mc_qty').value)}); alert('Component added'); }
async function sales(){ $('app').innerHTML=`<h2>Sales Entry</h2><div class="card grid"><select id="sale_menu">${opt(state.menu)}</select><input id="sale_qty" type="number" step="1" placeholder="Qty sold"><button onclick="saveSale()">Save Sale</button></div>`}
async function saveSale(){ let sr=(await sb.from('sales_reports').insert({branch_id:state.branchId,created_by:state.user.id}).select().single()).data; await sb.from('sales_report_lines').insert({sales_report_id:sr.id,menu_item_id:$('sale_menu').value,qty_sold:num($('sale_qty').value)}); let comps=(await sb.from('menu_item_components').select('*').eq('menu_item_id',$('sale_menu').value)).data||[]; for(const c of comps) await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:c.item_id,source_type:'SALES_DEDUCTION',qty:-num(c.qty_per_sale)*num($('sale_qty').value),source_table:'sales_reports',source_id:sr.id,created_by:state.user.id}); alert('Sale saved and stock deducted'); }
async function waste(){ $('app').innerHTML=`<h2>Wastage</h2><div class="card grid"><select id="w_item">${opt(state.items)}</select><input id="w_qty" type="number" step="0.001" placeholder="Qty"><select id="w_reason"><option>spoiled</option><option>burnt</option><option>expired</option><option>dropped</option><option>over-prepared</option><option>wrong preparation</option><option>returned food</option><option>other</option></select><input id="w_notes" placeholder="Notes"><button onclick="saveWaste()">Save Waste</button></div>`}
async function saveWaste(){ let w=(await sb.from('waste_entries').insert({branch_id:state.branchId,item_id:$('w_item').value,qty:num($('w_qty').value),reason:$('w_reason').value,notes:$('w_notes').value,created_by:state.user.id}).select().single()).data; await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:$('w_item').value,source_type:'WASTE',qty:-num($('w_qty').value),source_table:'waste_entries',source_id:w.id,reason:$('w_reason').value,created_by:state.user.id}); alert('Waste saved and stock deducted'); }
async function staff(){ $('app').innerHTML=`<h2>Staff Meals + Clock</h2><div class="card row"><button onclick="clockIn()">Clock In</button><button onclick="clockOut()" class="secondary">Clock Out</button></div><div class="card"><h3>Staff Meal</h3><div class="grid"><select id="sm_menu">${opt(state.menu)}</select><input id="sm_qty" type="number" value="1"><button onclick="saveMeal()">Save Staff Meal</button></div></div>`}
async function clockIn(){ await sb.from('time_clock_entries').insert({branch_id:state.branchId,user_id:state.user.id}); alert('Clocked in'); }
async function clockOut(){ let open=(await sb.from('time_clock_entries').select('*').eq('user_id',state.user.id).eq('branch_id',state.branchId).is('clock_out',null).order('clock_in',{ascending:false}).limit(1)).data?.[0]; if(open) await sb.from('time_clock_entries').update({clock_out:new Date().toISOString()}).eq('id',open.id); alert(open?'Clocked out':'No open shift found'); }
async function saveMeal(){ let mi=state.menu.find(m=>m.id===$('sm_menu').value), policy=(await q('staff_meal_policy'))[0]||{max_discountable_amount:30,discount_percent:50}; let total=num(mi?.sale_price)*num($('sm_qty').value), disc=Math.min(total,num(policy.max_discountable_amount))*num(policy.discount_percent)/100, charge=total-disc; let meal=(await sb.from('staff_meals').insert({branch_id:state.branchId,user_id:state.user.id,total_value:total,employee_charge:charge}).select().single()).data; await sb.from('staff_meal_lines').insert({staff_meal_id:meal.id,menu_item_id:$('sm_menu').value,qty:num($('sm_qty').value)}); let comps=(await sb.from('menu_item_components').select('*').eq('menu_item_id',$('sm_menu').value)).data||[]; for(const c of comps) await sb.from('stock_movements').insert({branch_id:state.branchId,item_id:c.item_id,source_type:'STAFF_MEAL',qty:-num(c.qty_per_sale)*num($('sm_qty').value),source_table:'staff_meals',source_id:meal.id,created_by:state.user.id}); alert(`Staff meal saved. Payroll deduction: $${money(charge)}`); }
async function alerts(){ let rows=(await sb.from('alerts').select('*').eq('branch_id',state.branchId).order('created_at',{ascending:false}).limit(50)).data||[]; $('app').innerHTML=`<h2>Alerts</h2><div class="card">${table(rows,['alert_type','title','body','resolved','resolution_action','created_at'])}</div>` }
init().catch(e=>{$('app').innerHTML=`<div class="card"><h3>Error</h3><pre>${e.message}</pre></div>`});
</script>
</body>
</html>
