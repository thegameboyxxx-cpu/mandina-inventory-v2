<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mandina Kitchen Inventory V2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f7f1e7;
      --panel:#fffaf2;
      --panel2:#ffffff;
      --text:#2a2018;
      --muted:#7b6b5c;
      --brand:#8b1e1e;
      --brand2:#c9974b;
      --green:#1f7a4d;
      --orange:#c46a1b;
      --red:#b42318;
      --blue:#2155a3;
      --line:#eadfce;
      --shadow:0 10px 30px rgba(49,33,20,.10);
      --radius:18px;
      --sidebar:280px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:linear-gradient(135deg,#fbf6ed 0%,#f3e8d6 100%);
      color:var(--text);
      min-height:100vh;
    }
    button,input,select,textarea{font:inherit}
    .hidden{display:none!important}
    .app-shell{display:flex;min-height:100vh}
    .sidebar{
      width:var(--sidebar);
      background:#28170f;
      color:#fff;
      padding:22px 18px;
      position:fixed;
      left:0;top:0;bottom:0;
      overflow:auto;
      z-index:10;
    }
    .brandbox{
      display:flex;align-items:center;gap:12px;
      padding:8px 6px 22px;
      border-bottom:1px solid rgba(255,255,255,.12);
      margin-bottom:16px;
    }
    .brandbox img{
      width:52px;height:52px;object-fit:contain;border-radius:12px;background:#fff;padding:5px;
    }
    .brandbox .title{font-weight:800;font-size:17px;line-height:1.1}
    .brandbox .sub{font-size:12px;color:#e8d3b5;margin-top:4px}
    .nav button{
      width:100%;display:flex;align-items:center;gap:11px;
      border:0;background:transparent;color:#f8ead6;
      text-align:left;padding:12px 12px;border-radius:13px;cursor:pointer;
      margin:4px 0;
    }
    .nav button:hover{background:rgba(255,255,255,.08)}
    .nav button.active{background:var(--brand);box-shadow:inset 3px 0 0 var(--brand2)}
    .nav .soon{opacity:.58}
    .main{
      margin-left:var(--sidebar);
      flex:1;
      padding:22px;
      min-width:0;
    }
    .topbar{
      display:flex;justify-content:space-between;align-items:center;gap:14px;
      background:rgba(255,250,242,.88);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px 16px;
      box-shadow:var(--shadow);
      position:sticky;top:14px;z-index:5;backdrop-filter:blur(8px);
    }
    .topbar h1{font-size:21px;margin:0}
    .top-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{
      display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
      background:#fff;border-radius:999px;padding:8px 11px;font-size:13px;color:var(--muted);
    }
    .btn{
      border:0;border-radius:12px;padding:10px 14px;cursor:pointer;
      font-weight:700;background:var(--brand);color:#fff;
      box-shadow:0 5px 14px rgba(139,30,30,.18);
    }
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none}
    .btn.gold{background:var(--brand2);color:#21150e}
    .btn.green{background:var(--green)}
    .btn.red{background:var(--red)}
    .btn.small{padding:7px 10px;border-radius:10px;font-size:13px}
    .content{margin-top:22px}
    .grid{display:grid;gap:16px}
    .grid.cards{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{
      background:rgba(255,250,242,.92);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }
    .stat-title{font-size:13px;color:var(--muted);margin-bottom:8px}
    .stat-value{font-size:30px;font-weight:900;color:var(--brand)}
    .section-head{
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      margin:0 0 14px;
    }
    .section-head h2{margin:0;font-size:22px}
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .input, select, textarea{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
      color:var(--text);
      min-height:42px;
      width:100%;
    }
    .toolbar .input{width:250px}
    label{font-size:13px;font-weight:700;color:#604c3c;display:block;margin-bottom:6px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .form-grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
    .full{grid-column:1/-1}
    table{width:100%;border-collapse:separate;border-spacing:0;overflow:hidden}
    th,td{padding:12px;border-bottom:1px solid var(--line);vertical-align:middle;text-align:left;font-size:14px}
    th{color:#6b5644;font-size:12px;text-transform:uppercase;letter-spacing:.04em;background:#fff6e8}
    tr:hover td{background:#fffdf8}
    .badge{
      display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;
      background:#eee;color:#333;
    }
    .badge.green{background:#e5f5ed;color:#12663d}
    .badge.red{background:#fde9e7;color:#9b1c13}
    .badge.gold{background:#fff0cf;color:#7a4c00}
    .modal-backdrop{
      position:fixed;inset:0;background:rgba(23,13,8,.55);z-index:30;
      display:flex;align-items:center;justify-content:center;padding:18px;
    }
    .modal{
      width:min(900px,96vw);max-height:92vh;overflow:auto;
      background:var(--panel2);border-radius:24px;box-shadow:0 24px 80px rgba(0,0,0,.35);
      border:1px solid var(--line);
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--line)
    }
    .modal-head h3{margin:0}
    .modal-body{padding:20px}
    .modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--line)}
    .toast{
      position:fixed;right:20px;bottom:20px;z-index:60;
      background:#22150e;color:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow);
      max-width:420px;
    }
    .login-page{
      min-height:100vh;display:grid;place-items:center;padding:20px;
    }
    .login-card{
      width:min(460px,94vw);background:rgba(255,250,242,.95);border:1px solid var(--line);
      border-radius:28px;box-shadow:var(--shadow);padding:30px;text-align:center;
    }
    .login-card img{width:92px;height:92px;object-fit:contain;background:#fff;border-radius:22px;padding:8px}
    .login-card h1{font-size:26px;margin:18px 0 8px}
    .login-card p{color:var(--muted);margin:0 0 20px}
    .muted{color:var(--muted)}
    .errorbox{
      background:#fff1f0;border:1px solid #ffccc7;color:#9b1c13;
      border-radius:14px;padding:12px;margin:12px 0;white-space:pre-wrap;
    }
    .mobile-menu{display:none}
    @media (max-width:900px){
      .sidebar{transform:translateX(-100%);transition:.2s}
      .sidebar.open{transform:translateX(0)}
      .main{margin-left:0;padding:14px}
      .mobile-menu{display:inline-flex}
      .grid.cards{grid-template-columns:repeat(2,minmax(0,1fr))}
      .form-grid,.form-grid.three{grid-template-columns:1fr}
      .topbar{align-items:flex-start;flex-direction:column}
      .toolbar .input{width:100%}
    }
    @media (max-width:520px){
      .grid.cards{grid-template-columns:1fr}
      th:nth-child(4),td:nth-child(4){display:none}
    }
  </style>
</head>
<body>
<div id="loginPage" class="login-page hidden">
  <div class="login-card">
    <img src="https://www.mandinakitchen.com.au/wp-content/uploads/2021/12/Mandina-Logo.png" alt="Mandina Logo">
    <h1>Mandina Inventory V2</h1>
    <p>Inventory & Production System</p>
    <button class="btn" id="loginBtn">Login with Google</button>
    <div id="loginError" class="errorbox hidden"></div>
  </div>
</div>

<div id="app" class="app-shell hidden">
  <aside id="sidebar" class="sidebar">
    <div class="brandbox">
      <img src="https://www.mandinakitchen.com.au/wp-content/uploads/2021/12/Mandina-Logo.png" alt="Mandina Logo">
      <div>
        <div class="title">Mandina Kitchen</div>
        <div class="sub">Inventory & Production V2</div>
      </div>
    </div>
    <div class="nav" id="nav">
      <button data-page="dashboard" class="active">📊 Dashboard</button>
      <button data-page="suppliers" data-manager="true">🚚 Suppliers</button>
      <button data-page="items" data-manager="true">📦 Items</button>
      <button data-page="purchase" class="soon">🧾 Purchase Orders</button>
      <button data-page="receiving" class="soon">📥 Receiving</button>
      <button data-page="production" class="soon">🍚 Production</button>
      <button data-page="sales" class="soon">🛒 Sales</button>
      <button data-page="counts" class="soon">✅ Daily Count</button>
      <button data-page="waste" class="soon">🗑️ Wastage</button>
      <button data-page="staffmeal" class="soon">🍽️ Staff Meal</button>
      <button data-page="timeclock" class="soon">⏱️ Time Clock</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn secondary small mobile-menu" id="mobileMenuBtn">☰</button>
        <div>
          <h1 id="pageTitle">Dashboard</h1>
          <div class="muted" id="profileLine">Loading...</div>
        </div>
      </div>
      <div class="top-actions">
        <span class="chip">Branch:
          <select id="branchSelect" style="border:0;background:transparent;min-height:auto;padding:0;width:auto;font-weight:800;color:var(--text)"></select>
        </span>
        <span class="chip" id="roleChip">Role</span>
        <button class="btn secondary small" id="refreshBtn">Refresh</button>
        <button class="btn red small" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div id="content" class="content"></div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast hidden"></div>

<script>
/* =========================================================
   MANDINA INVENTORY V2 - SINGLE HTML FOUNDATION
   Phase 1: Auth + Layout + Branch + Suppliers + Items
   ========================================================= */

const CONFIG = {
  supabaseUrl: "https://xuxfsledecxxoddbejcg.supabase.co",
  supabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eGZzbGVkZWN4eG9kZGJlamNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI2NTQ1ODIsImV4cCI6MjA5ODIzMDU4Mn0.bj2F0DhjZB2PeLvS7JcWHSpsuFIO5exMmqu4PRr1IYA",
  appUrl: "https://mandina-inventory-v2.vercel.app/",
  defaultBranches: [
    { id: "carlton", name: "Carlton", active: true },
    { id: "campbellfield", name: "Campbellfield", active: true }
  ]
};

const db = supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey);

const state = {
  user: null,
  profile: null,
  role: "staff",
  branches: [],
  currentBranchId: localStorage.getItem("mandina_branch") || "carlton",
  page: "dashboard",
  suppliers: [],
  categories: [],
  items: []
};

const $ = (id) => document.getElementById(id);
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));

function toast(msg, type="info"){
  const el = $("toast");
  el.textContent = msg;
  el.classList.remove("hidden");
  el.style.background = type === "error" ? "#9b1c13" : type === "ok" ? "#12663d" : "#22150e";
  setTimeout(()=>el.classList.add("hidden"), 3500);
}

function showError(msg){
  return `<div class="errorbox">${esc(msg)}</div>`;
}

function isManager(){
  return state.role === "manager";
}

async function safeSelect(table, columns="*", opts={}){
  let q = db.from(table).select(columns);
  if(opts.eq) for(const [k,v] of Object.entries(opts.eq)) q = q.eq(k,v);
  if(opts.order) q = q.order(opts.order, { ascending: opts.ascending ?? true });
  const { data, error } = await q;
  if(error) throw new Error(`${table}: ${error.message}`);
  return data || [];
}

async function init(){
  $("loginBtn").onclick = login;
  $("logoutBtn").onclick = logout;
  $("refreshBtn").onclick = refreshCurrent;
  $("mobileMenuBtn").onclick = () => $("sidebar").classList.toggle("open");
  $("branchSelect").onchange = (e)=>{
    state.currentBranchId = e.target.value;
    localStorage.setItem("mandina_branch", state.currentBranchId);
    refreshCurrent();
  };

  document.querySelectorAll("#nav button").forEach(btn=>{
    btn.onclick = ()=>{
      const page = btn.dataset.page;
      if(btn.classList.contains("soon")){
        toast("This module is planned. We will build it in the next phases.");
        return;
      }
      setPage(page);
    };
  });

  const { data } = await db.auth.getSession();
  if(!data.session){
    $("loginPage").classList.remove("hidden");
    return;
  }
  state.user = data.session.user;
  await bootApp();
}

async function login(){
  $("loginError").classList.add("hidden");
  const { error } = await db.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: CONFIG.appUrl }
  });
  if(error){
    $("loginError").textContent = error.message;
    $("loginError").classList.remove("hidden");
  }
}

async function logout(){
  await db.auth.signOut();
  location.reload();
}

async function bootApp(){
  $("loginPage").classList.add("hidden");
  $("app").classList.remove("hidden");

  await ensureProfile();
  await ensureBranches();
  await loadBranches();
  await applyRoleUI();
  renderBranchSelect();
  await refreshCurrent();
}

async function ensureProfile(){
  const id = state.user.id;
  const fullName = state.user.user_metadata?.full_name || state.user.user_metadata?.name || state.user.email || "User";

  let { data, error } = await db.from("profiles").select("*").eq("id", id).maybeSingle();

  if(error && error.code !== "PGRST116") {
    throw new Error(error.message);
  }

  if(!data){
    const role = "manager"; // first phase bootstrap: first login becomes manager unless changed in DB later.
    const ins = await db.from("profiles").insert({ id, full_name: fullName, role }).select("*").single();
    if(ins.error){
      // If RLS blocks insert, continue as manager locally so user can at least test UI.
      state.profile = { id, full_name: fullName, role: "manager" };
      state.role = "manager";
      toast("Profile insert blocked by DB policy. UI will continue as Manager for now.", "error");
      return;
    }
    data = ins.data;
  }

  state.profile = data;
  state.role = (data.role || "staff").toLowerCase();
  if(!["manager","staff"].includes(state.role)) state.role = "staff";
}

async function ensureBranches(){
  try{
    const branches = await safeSelect("branches", "*");
    if(branches.length === 0){
      await db.from("branches").insert(CONFIG.defaultBranches);
    }
  }catch(e){
    console.warn(e);
  }
}

async function loadBranches(){
  try{
    state.branches = await safeSelect("branches", "*", { order: "name" });
  }catch(e){
    state.branches = CONFIG.defaultBranches;
  }
  if(!state.branches.find(b=>b.id === state.currentBranchId)){
    state.currentBranchId = state.branches[0]?.id || "carlton";
  }
}

function renderBranchSelect(){
  const sel = $("branchSelect");
  sel.innerHTML = state.branches.map(b=>`<option value="${esc(b.id)}">${esc(b.name)}</option>`).join("");
  sel.value = state.currentBranchId;
  sel.disabled = !isManager();
}

async function applyRoleUI(){
  $("profileLine").textContent = `${state.profile?.full_name || state.user.email}`;
  $("roleChip").textContent = isManager() ? "Manager" : "Staff";
  document.querySelectorAll("[data-manager='true']").forEach(el=>{
    el.style.display = isManager() ? "" : "none";
  });
}

function setPage(page){
  state.page = page;
  document.querySelectorAll("#nav button").forEach(b=>b.classList.toggle("active", b.dataset.page===page));
  $("sidebar").classList.remove("open");
  refreshCurrent();
}

async function refreshCurrent(){
  const titles = { dashboard:"Dashboard", suppliers:"Suppliers", items:"Items" };
  $("pageTitle").textContent = titles[state.page] || "Mandina";
  if(state.page === "dashboard") return renderDashboard();
  if(state.page === "suppliers") return renderSuppliers();
  if(state.page === "items") return renderItems();
}

/* =========================
   DASHBOARD
   ========================= */

async function renderDashboard(){
  const content = $("content");
  content.innerHTML = `<div class="card">Loading dashboard...</div>`;
  let stats = { suppliers:0, items:0, alerts:0, stock:0 };
  try{
    const [suppliers, items, alerts, stock] = await Promise.all([
      db.from("suppliers").select("*", { count:"exact", head:true }),
      db.from("items").select("*", { count:"exact", head:true }),
      db.from("alerts").select("*", { count:"exact", head:true }).eq("status","open"),
      db.from("stock_balances").select("*", { count:"exact", head:true }).eq("branch_id", state.currentBranchId)
    ]);
    stats.suppliers = suppliers.count || 0;
    stats.items = items.count || 0;
    stats.alerts = alerts.count || 0;
    stats.stock = stock.count || 0;
  }catch(e){}

  content.innerHTML = `
    <div class="grid cards">
      <div class="card"><div class="stat-title">Suppliers</div><div class="stat-value">${stats.suppliers}</div></div>
      <div class="card"><div class="stat-title">Items</div><div class="stat-value">${stats.items}</div></div>
      <div class="card"><div class="stat-title">Open Alerts</div><div class="stat-value">${stats.alerts}</div></div>
      <div class="card"><div class="stat-title">Stock Lines / Branch</div><div class="stat-value">${stats.stock}</div></div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="section-head"><h2>Phase 1 Foundation</h2></div>
      <p class="muted">
        This build includes Google Auth, role-aware layout, branch separation, Dashboard, Suppliers and Items.
        Next phases will add Purchase Orders, Receiving, Production, Sales, Counts, Waste and Staff Meal.
      </p>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="section-head"><h2>Design Rules Active</h2></div>
      <table>
        <tr><th>Rule</th><th>Status</th></tr>
        <tr><td>Setup data shared across branches</td><td><span class="badge green">Active</span></td></tr>
        <tr><td>Transactions separated by branch</td><td><span class="badge green">Active</span></td></tr>
        <tr><td>Manager sees prices and setup</td><td><span class="badge green">Active</span></td></tr>
        <tr><td>Staff sees operational screens only</td><td><span class="badge gold">Next phases</span></td></tr>
      </table>
    </div>`;
}

/* =========================
   SUPPLIERS
   ========================= */

async function loadSuppliers(){
  state.suppliers = await safeSelect("suppliers", "*", { order: "created_at", ascending:false }).catch(async()=>{
    return await safeSelect("suppliers", "*");
  });
}

function supplierName(s){
  return s.company_name || s.name || s.supplier_name || "Supplier";
}

async function renderSuppliers(){
  if(!isManager()) return $("content").innerHTML = showError("Staff users cannot access Suppliers.");
  const content = $("content");
  content.innerHTML = `<div class="card">Loading suppliers...</div>`;
  try{
    await loadSuppliers();
    content.innerHTML = `
      <div class="card">
        <div class="section-head">
          <h2>Suppliers</h2>
          <div class="toolbar">
            <input id="supplierSearch" class="input" placeholder="Search supplier...">
            <button class="btn" onclick="openSupplierModal()">+ Add Supplier</button>
          </div>
        </div>
        <div id="suppliersTable"></div>
      </div>`;
    $("supplierSearch").oninput = renderSuppliersTable;
    renderSuppliersTable();
  }catch(e){
    content.innerHTML = showError("Could not load suppliers. " + e.message);
  }
}

function renderSuppliersTable(){
  const q = ($("supplierSearch")?.value || "").toLowerCase();
  const rows = state.suppliers.filter(s => JSON.stringify(s).toLowerCase().includes(q));
  $("suppliersTable").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Company</th><th>Contact</th><th>Phone</th><th>Email</th><th>Status</th><th></th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(s=>`
          <tr>
            <td><b>${esc(supplierName(s))}</b><div class="muted">${esc(s.address || s.company_address || "")}</div></td>
            <td>${esc(s.contact_person || "")}</td>
            <td>${esc(s.phone || s.company_phone || s.contact_mobile || "")}</td>
            <td>${esc(s.email || s.company_email || "")}</td>
            <td>${s.active === false ? '<span class="badge red">Inactive</span>' : '<span class="badge green">Active</span>'}</td>
            <td><button class="btn secondary small" onclick='openSupplierModal(${JSON.stringify(s).replaceAll("'","&#039;")})'>Edit</button></td>
          </tr>`).join("") || `<tr><td colspan="6" class="muted">No suppliers yet.</td></tr>`}
      </tbody>
    </table>`;
}

function openSupplierModal(s=null){
  const isEdit = !!s;
  openModal(`
    <div class="modal-head">
      <h3>${isEdit ? "Edit Supplier" : "Add Supplier"}</h3>
      <button class="btn secondary small" onclick="closeModal()">✕</button>
    </div>
    <form id="supplierForm">
      <div class="modal-body">
        <div class="form-grid">
          <div><label>Company Name</label><input name="company_name" class="input" required value="${esc(supplierName(s||{}))}"></div>
          <div><label>Contact Person</label><input name="contact_person" class="input" value="${esc(s?.contact_person || "")}"></div>
          <div><label>Company Phone</label><input name="company_phone" class="input" value="${esc(s?.company_phone || s?.phone || "")}"></div>
          <div><label>Contact Mobile</label><input name="contact_mobile" class="input" value="${esc(s?.contact_mobile || "")}"></div>
          <div><label>Company Email</label><input name="company_email" type="email" class="input" value="${esc(s?.company_email || s?.email || "")}"></div>
          <div><label>Status</label><select name="active"><option value="true">Active</option><option value="false">Inactive</option></select></div>
          <div class="full"><label>Company Address</label><textarea name="company_address" class="input" rows="3">${esc(s?.company_address || s?.address || "")}</textarea></div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn">${isEdit ? "Save Changes" : "Create Supplier"}</button>
      </div>
    </form>`);
  if(s?.active === false) document.querySelector("[name='active']").value = "false";
  $("supplierForm").onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {
      company_name: fd.get("company_name"),
      contact_person: fd.get("contact_person") || null,
      company_phone: fd.get("company_phone") || null,
      contact_mobile: fd.get("contact_mobile") || null,
      company_email: fd.get("company_email") || null,
      company_address: fd.get("company_address") || null,
      active: fd.get("active") === "true"
    };
    try{
      let res;
      if(isEdit) res = await db.from("suppliers").update(payload).eq("id", s.id);
      else res = await db.from("suppliers").insert(payload);
      if(res.error) throw res.error;
      toast("Supplier saved.", "ok");
      closeModal();
      renderSuppliers();
    }catch(err){
      toast("Supplier save failed: " + err.message, "error");
    }
  };
}

/* =========================
   ITEMS
   ========================= */

async function loadItemDeps(){
  const [suppliers, categories] = await Promise.all([
    safeSelect("suppliers", "*").catch(()=>[]),
    safeSelect("item_categories", "*", { order:"sort_order" }).catch(()=>[])
  ]);
  state.suppliers = suppliers;
  state.categories = categories;
}

async function loadItems(){
  state.items = await safeSelect("items", "*", { order:"created_at", ascending:false }).catch(async()=>safeSelect("items","*"));
}

async function renderItems(){
  if(!isManager()) return $("content").innerHTML = showError("Staff users cannot access Items setup.");
  const content = $("content");
  content.innerHTML = `<div class="card">Loading items...</div>`;
  try{
    await loadItemDeps();
    await loadItems();
    content.innerHTML = `
      <div class="card">
        <div class="section-head">
          <h2>Items</h2>
          <div class="toolbar">
            <input id="itemSearch" class="input" placeholder="Search item...">
            <button class="btn secondary" onclick="openCategoryModal()">+ Category</button>
            <button class="btn" onclick="openItemModal()">+ Add Item</button>
          </div>
        </div>
        <div id="itemsTable"></div>
      </div>`;
    $("itemSearch").oninput = renderItemsTable;
    renderItemsTable();
  }catch(e){
    content.innerHTML = showError("Could not load items. " + e.message);
  }
}

function catName(id){
  return state.categories.find(c=>c.id===id)?.name || "";
}
function suppName(id){
  const s = state.suppliers.find(x=>x.id===id);
  return s ? supplierName(s) : "";
}
function renderItemsTable(){
  const q = ($("itemSearch")?.value || "").toLowerCase();
  const rows = state.items.filter(i => JSON.stringify(i).toLowerCase().includes(q));
  $("itemsTable").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Item</th><th>Category</th><th>Supplier</th><th>Receiving</th><th>Stock Unit</th><th>Cost Unit</th><th>Recipe Controlled</th><th></th>
        </tr>
      </thead>
      <tbody>
      ${rows.map(i=>`
        <tr>
          <td><b>${esc(i.name)}</b><div class="muted">${esc(i.name_ar || "")}</div></td>
          <td>${esc(catName(i.category_id))}</td>
          <td>${esc(suppName(i.primary_supplier_id))}</td>
          <td>${esc(receivingText(i))}</td>
          <td>${esc(i.stock_unit)}</td>
          <td>${esc(i.cost_unit || i.stock_unit)}</td>
          <td>${i.is_recipe_controlled ? '<span class="badge green">Yes</span>' : '<span class="badge gold">Count only</span>'}</td>
          <td><button class="btn secondary small" onclick='openItemModal(${JSON.stringify(i).replaceAll("'","&#039;")})'>Edit</button></td>
        </tr>`).join("") || `<tr><td colspan="8" class="muted">No items yet.</td></tr>`}
      </tbody>
    </table>`;
}

function packageText(i){
  const type = i.purchase_package_type || "";
  const qty = i.purchase_package_qty ?? "";
  const unit = i.purchase_package_unit || "";
  if(!type && !qty && !unit) return "";
  return `${type} ${qty} ${unit}`.trim();
}

function receivingText(i){
  const r = i.receiving_unit || i.purchase_package_type || "";
  const pack = packageText(i);
  return pack ? `${r} (${pack})` : r;
}

function options(list, selected, labelFn){
  return `<option value="">-- Select --</option>` + list.map(x=>`<option value="${esc(x.id)}" ${x.id===selected ? "selected":""}>${esc(labelFn(x))}</option>`).join("");
}

function openItemModal(i=null){
  const isEdit = !!i;
  openModal(`
    <div class="modal-head">
      <h3>${isEdit ? "Edit Item" : "Add Item"}</h3>
      <button class="btn secondary small" onclick="closeModal()">✕</button>
    </div>
    <form id="itemForm">
      <div class="modal-body">
        <div class="form-grid">
          <div><label>Item Name</label><input name="name" class="input" required value="${esc(i?.name || "")}"></div>
          <div><label>Arabic Name</label><input name="name_ar" class="input" value="${esc(i?.name_ar || "")}"></div>
          <div><label>Category</label><select name="category_id">${options(state.categories, i?.category_id, c=>c.name)}</select></div>
          <div><label>Primary Supplier</label><select name="primary_supplier_id">${options(state.suppliers, i?.primary_supplier_id, supplierName)}</select></div>

          <div><label>Receiving Unit</label>
            <input name="receiving_unit" class="input" required placeholder="bag, carton, bottle, piece, kg..." value="${esc(i?.receiving_unit || i?.purchase_package_type || "")}">
            <div class="muted" style="font-size:12px;margin-top:5px">What staff count when goods arrive.</div>
          </div>
          <div><label>Stock Unit</label>
            <input name="stock_unit" class="input" required placeholder="kg, L, pieces, portions..." value="${esc(i?.stock_unit || "")}">
            <div class="muted" style="font-size:12px;margin-top:5px">How the system tracks stock balance.</div>
          </div>
          <div><label>Cost / Billing Unit</label>
            <input name="cost_unit" class="input" required placeholder="kg, bag, carton, piece..." value="${esc(i?.cost_unit || i?.stock_unit || "")}">
            <div class="muted" style="font-size:12px;margin-top:5px">Supplier invoice unit. Default price is per this unit.</div>
          </div>
          <div><label>Purchase Package Type</label>
            <select name="purchase_package_type">
              ${["","bag","box","carton","tray","bucket","bottle","pack","roll","piece"].map(v=>`<option value="${v}" ${v===(i?.purchase_package_type||"")?"selected":""}>${v || "-- Select --"}</option>`).join("")}
            </select>
          </div>
          <div><label>Package Quantity</label><input name="purchase_package_qty" type="number" step="0.001" class="input" value="${esc(i?.purchase_package_qty ?? "")}"></div>
          <div><label>Package Unit</label><input name="purchase_package_unit" class="input" placeholder="kg, L, pieces..." value="${esc(i?.purchase_package_unit || "")}"></div>

          <div><label>Reorder Level</label><input name="reorder_level" type="number" step="0.001" class="input" value="${esc(i?.reorder_level ?? "")}"></div>
          <div><label>Reorder Qty</label><input name="reorder_qty" type="number" step="0.001" class="input" value="${esc(i?.reorder_qty ?? "")}"></div>
          <div><label>Cost per Billing Unit</label><input name="default_purchase_price" type="number" step="0.01" class="input" value="${esc(i?.default_purchase_price ?? "")}">
            <div class="muted" style="font-size:12px;margin-top:5px">
  This price is per Cost/Billing Unit. Example: $18 per kg, $50 per bottle, $36 per carton.
</div>
          </div>
          <div><label>Recipe/Sales Controlled?</label><select name="is_recipe_controlled"><option value="false">No - count report only</option><option value="true">Yes - sales variance alert</option></select></div>
          <div><label>Status</label><select name="active"><option value="true">Active</option><option value="false">Inactive</option></select></div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn">${isEdit ? "Save Changes" : "Create Item"}</button>
      </div>
    </form>`);
  if(i?.is_recipe_controlled) document.querySelector("[name='is_recipe_controlled']").value = "true";
  if(i?.active === false) document.querySelector("[name='active']").value = "false";

  $("itemForm").onsubmit = async (e)=>{
    e.preventDefault();
    const fd = new FormData(e.target);
    const n = (k) => fd.get(k) === "" ? null : Number(fd.get(k));
    const payload = {
      name: fd.get("name"),
      name_ar: fd.get("name_ar") || null,
      category_id: fd.get("category_id") || null,
      primary_supplier_id: fd.get("primary_supplier_id") || null,
      receiving_unit: fd.get("receiving_unit"),
      cost_unit: fd.get("cost_unit"),
      purchase_package_type: fd.get("purchase_package_type") || null,
      purchase_package_qty: n("purchase_package_qty"),
      purchase_package_unit: fd.get("purchase_package_unit") || null,
      stock_unit: fd.get("stock_unit"),
      has_dual_unit: fd.get("cost_unit") !== fd.get("stock_unit"),
      secondary_unit: fd.get("cost_unit") !== fd.get("stock_unit") ? fd.get("cost_unit") : null,
      reorder_level: n("reorder_level"),
      reorder_qty: n("reorder_qty"),
      default_purchase_price: n("default_purchase_price"),
      is_recipe_controlled: fd.get("is_recipe_controlled") === "true",
      active: fd.get("active") === "true",
      updated_at: new Date().toISOString()
    };
    if(!isEdit) payload.created_by = state.user.id;

    try{
      let res;
      if(isEdit) res = await db.from("items").update(payload).eq("id", i.id);
      else res = await db.from("items").insert(payload);
      if(res.error) throw res.error;
      toast("Item saved.", "ok");
      closeModal();
      renderItems();
    }catch(err){
      toast("Item save failed: " + err.message, "error");
    }
  };
}

function openCategoryModal(){
  openModal(`
    <div class="modal-head">
      <h3>Add Category</h3>
      <button class="btn secondary small" onclick="closeModal()">✕</button>
    </div>
    <form id="catForm">
      <div class="modal-body">
        <label>Category Name</label>
        <input name="name" class="input" required>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn secondary" onclick="closeModal()">Cancel</button>
        <button class="btn">Create Category</button>
      </div>
    </form>`);
  $("catForm").onsubmit = async(e)=>{
    e.preventDefault();
    const name = new FormData(e.target).get("name");
    const { error } = await db.from("item_categories").insert({ name });
    if(error) return toast(error.message, "error");
    toast("Category created.", "ok");
    closeModal();
    renderItems();
  };
}

/* =========================
   MODAL
   ========================= */

function openModal(html){
  $("modalRoot").innerHTML = `<div class="modal-backdrop"><div class="modal">${html}</div></div>`;
}
function closeModal(){
  $("modalRoot").innerHTML = "";
}

init().catch(err=>{
  console.error(err);
  document.body.innerHTML = `<div style="padding:20px">${showError(err.message)}</div>`;
});
</script>
</body>
</html>
