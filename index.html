<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="mobile-web-app-capable" content="yes"><title>Mandina Inventory V2</title><link rel="stylesheet" href="./css/app.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body>
<div id="loginPage" class="login-page hidden"><div class="login-card"><img src="https://www.mandinakitchen.com.au/wp-content/uploads/2021/12/Mandina-Logo.png"><h1>Mandina Inventory V2</h1><p>Inventory & Production System</p><button class="btn" id="loginBtn">Login with Google</button><div id="loginError" class="errorbox hidden"></div></div></div>
<div id="app" class="app-shell hidden"><aside id="sidebar" class="sidebar"><div class="brandbox"><img src="https://www.mandinakitchen.com.au/wp-content/uploads/2021/12/Mandina-Logo.png"><div><div class="title">Mandina Kitchen</div><div class="sub">Inventory & Production V2</div></div></div><div class="nav" id="nav"><button data-page="dashboard" class="active">📊 Dashboard</button><button data-page="suppliers" data-manager="true">🚚 Suppliers</button><button data-page="items" data-manager="true">📦 Items</button><button data-page="purchase" data-manager="true">🧾 Purchase Orders</button><button data-page="receiving">📥 Receiving</button><button data-page="production">🍚 Production</button><button data-page="sales" class="soon">🛒 Sales</button><button data-page="counts" class="soon">✅ Daily Count</button><button data-page="waste" class="soon">🗑️ Wastage</button><button data-page="staffmeal" class="soon">🍽️ Staff Meal</button><button data-page="timeclock" class="soon">⏱️ Time Clock</button></div></aside><main class="main"><div class="topbar"><div style="display:flex;align-items:center;gap:10px"><button class="btn secondary small mobile-menu" id="mobileMenuBtn">☰</button><div><h1 id="pageTitle">Dashboard</h1><div class="muted" id="profileLine">Loading...</div></div></div><div class="top-actions"><span class="chip">Branch: <select id="branchSelect" class="branch-select"></select></span><span class="chip" id="roleChip">Role</span><button class="btn secondary small" id="refreshBtn">Refresh</button><button class="btn red small" id="logoutBtn">Logout</button></div></div><div id="content" class="content"></div></main></div><div id="modalRoot"></div><div id="toast" class="toast hidden"></div><script type="module" src="./js/app.js"></script></body></html>
