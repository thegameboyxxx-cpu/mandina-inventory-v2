<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Mandina Inventory V2</title>
  <link rel="stylesheet" href="./css/app.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="loginPage" class="login-page hidden">
    <div class="login-card">
      <img src="https://www.mandinakitchen.com.au/wp-content/uploads/2021/12/Mandina-Logo.png">
      <h1>Mandina Inventory V2</h1>
      <p>Inventory & Production System</p>
      <div class="form-grid" style="text-align:left;margin-top:14px">
        <div class="full"><label>Employee Number</label><input id="staffEmployeeNumber" class="input" inputmode="numeric" placeholder="Employee number"></div>
        <div class="full"><label>Password</label><input id="staffPassword" class="input" type="password" placeholder="Password"></div>
      </div>
      <button class="btn" id="staffLoginBtn" style="width:100%;margin-top:12px">Employee Login</button>
      <button class="btn secondary" id="loginBtn" style="width:100%;margin-top:10px">Manager Login with Google</button>
      <div id="loginError" class="errorbox hidden"></div>
    </div>
  </div>

  <div id="app" class="app-shell hidden">
    <aside id="sidebar" class="sidebar">
      <div class="brandbox">
        <img src="https://www.mandinakitchen.com.au/wp-content/uploads/2021/12/Mandina-Logo.png">
        <div>
          <div class="title">Mandina Kitchen</div>
          <div class="sub">Inventory & Production V2</div>
        </div>
      </div>
      <div class="nav" id="nav">
        <button data-page="dashboard" class="active">&#128202; Dashboard</button>
        <button data-page="alerts" data-full-manager="true">&#128680; Alerts</button>
        <button data-page="users" data-full-manager="true">&#128272; Users</button>
        <button data-page="suppliers" data-manager="true">&#128666; Suppliers</button>
        <button data-page="items" data-full-manager="true">&#128230; Items</button>
        <button data-page="producedItems" data-full-manager="true">&#127834; Produced Items</button>
        <button data-page="menuItems" data-full-manager="true">&#127869; Menu Items</button>
        <button data-page="purchase" data-full-manager="true">&#129534; Purchase Orders</button>
        <button data-page="receiving">&#128229; Receiving</button>
        <button data-page="stock">&#128203; Stock</button>
        <button data-page="production">&#127981; Production</button>
        <button data-page="sales">&#128722; Sales</button>
        <button data-page="counts">&#9989; Daily Count</button>
        <button data-page="waste">&#128465; Wastage</button>
        <button data-page="employees" data-manager="true">&#128101; Employees</button>
        <button data-page="shifts" data-manager="true">&#128197; Shift Planner</button>
        <button data-page="timeclock">&#9201; Time Clock</button>
        <button data-page="staffmeal">&#127860; Staff Meal</button>
        <button data-page="payroll" data-full-manager="true">&#128181; Payroll</button>
      </div>
      <div class="sidebar-tools">
        <label>Branch</label>
        <select id="sidebarBranchSelect" class="input"></select>
        <button class="btn secondary small" id="sidebarRefreshBtn">Refresh</button>
        <button class="btn red small" id="sidebarLogoutBtn">Logout</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="btn secondary small mobile-menu" id="mobileMenuBtn">&#9776;</button>
          <div>
            <h1 id="pageTitle">Dashboard</h1>
            <div class="muted" id="profileLine">Loading...</div>
          </div>
        </div>
        <div class="top-actions">
          <span class="chip">Branch: <select id="branchSelect" class="branch-select"></select></span>
          <span class="chip" id="roleChip">Role</span>
          <button class="btn secondary small" id="refreshBtn">Refresh</button>
          <button class="btn red small" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div id="content" class="content"></div>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toast" class="toast hidden"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
